<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jade Oracle — $29 Love & Relationship Reading</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #E8E3DB;
    font-family: 'Inter', sans-serif;
  }
  .card {
    width: 400px;
    height: 560px;
    background: #FAFAF7;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(26, 26, 26, 0.12), 0 2px 8px rgba(26, 26, 26, 0.06);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .card-header {
    background: linear-gradient(135deg, #722F37 0%, #8B3A44 40%, #5E252D 100%);
    padding: 28px 32px 24px;
    position: relative;
    overflow: hidden;
  }
  .card-header::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -20px;
    width: 140px;
    height: 140px;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
  }
  .icon-container {
    width: 52px;
    height: 52px;
    margin-bottom: 14px;
  }
  .icon-container svg {
    width: 52px;
    height: 52px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
  }
  .tag {
    display: inline-block;
    background: rgba(212, 175, 55, 0.2);
    border: 1px solid rgba(212, 175, 55, 0.35);
    color: #F5F0E8;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 21px;
    font-weight: 700;
    color: #FAFAF7;
    line-height: 1.25;
  }
  .card-body {
    padding: 24px 32px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14.5px;
    color: #722F37;
    margin-bottom: 18px;
    line-height: 1.4;
    opacity: 0.85;
  }
  .features {
    list-style: none;
    margin-bottom: 20px;
    flex: 1;
  }
  .features li {
    font-size: 13.5px;
    color: #1A1A1A;
    padding: 6px 0;
    padding-left: 24px;
    position: relative;
    line-height: 1.5;
    font-weight: 400;
  }
  .features li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 12px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    opacity: 0.6;
  }
  .features li:nth-child(1)::before { background: #722F37; }
  .features li:nth-child(2)::before { background: #D4AF37; }
  .features li:nth-child(3)::before { background: #00A86B; }
  .features li:nth-child(4)::before { background: #8FA882; }
  .delivery-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #F5F0E8;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 20px;
  }
  .delivery-badge svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }
  .delivery-badge span {
    font-size: 12px;
    color: #1A1A1A;
    font-weight: 500;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px 26px;
  }
  .price {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: #D4AF37;
    line-height: 1;
  }
  .price-note {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #8FA882;
    margin-top: 2px;
    font-weight: 400;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #722F37;
    color: #FAFAF7;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s;
    text-decoration: none;
  }
  .cta-btn:hover {
    background: #5E252D;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="icon-container">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Heart / love jade icon -->
        <path d="M26 44 C26 44, 6 30, 6 18 C6 10, 12 6, 18 6 C22 6, 25 8, 26 12 C27 8, 30 6, 34 6 C40 6, 46 10, 46 18 C46 30, 26 44, 26 44Z" fill="rgba(255,255,255,0.12)" stroke="rgba(212,175,55,0.5)" stroke-width="1.2"/>
        <path d="M26 38 C26 38, 12 28, 12 20 C12 14, 16 12, 20 12 C23 12, 25 14, 26 16 C27 14, 29 12, 32 12 C36 12, 40 14, 40 20 C40 28, 26 38, 26 38Z" fill="rgba(212,175,55,0.2)" stroke="rgba(212,175,55,0.3)" stroke-width="0.8"/>
        <circle cx="26" cy="24" r="4" fill="rgba(212,175,55,0.35)"/>
      </svg>
    </div>
    <span class="tag">Most Popular</span>
    <h2 class="card-title">Love & Relationship<br>Reading</h2>
  </div>
  <div class="card-body">
    <p class="subtitle">"Illuminate the path of your heart"</p>
    <ul class="features">
      <li>Full QMDJ love chart analysis</li>
      <li>Past, present & future love energy</li>
      <li>Compatibility insights & timing</li>
      <li>Actionable relationship guidance</li>
    </ul>
    <div class="delivery-badge">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="14" rx="2" stroke="#722F37" stroke-width="1.2" fill="none"/><path d="M5 6h6M5 9h6M5 12h4" stroke="#722F37" stroke-width="0.8" stroke-linecap="round"/></svg>
      <span>Delivered as a beautiful PDF report</span>
    </div>
  </div>
  <div class="card-footer">
    <div>
      <div class="price">$29</div>
      <div class="price-note">one-time</div>
    </div>
    <a href="#" class="cta-btn">Get Reading</a>
  </div>
</div>
</body>
</html>
