<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Ascending stairs / path -->
  <path d="M8 56 L8 46 L18 46 L18 38 L28 38 L28 30 L38 30 L38 22 L48 22 L48 14" stroke="#1A1A1A" stroke-width="2" fill="none"/>
  <!-- Stair risers (vertical fills for depth) -->
  <line x1="8" y1="56" x2="18" y2="56" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="18" y1="46" x2="28" y2="46" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="28" y1="38" x2="38" y2="38" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="38" y1="30" x2="48" y2="30" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <!-- Star at the top -->
  <polygon points="52,6 53.5,10 58,10.5 54.5,13.5 55.5,18 52,15.5 48.5,18 49.5,13.5 46,10.5 50.5,10" fill="#D4AF37" stroke="#D4AF37" stroke-width="0.75"/>
  <!-- Subtle glow behind star -->
  <circle cx="52" cy="12" r="8" fill="#D4AF37" opacity="0.08" stroke="none"/>
  <!-- Small figure at bottom of stairs -->
  <circle cx="12" cy="42" r="2" stroke="#00A86B" stroke-width="1.5" fill="none"/>
  <line x1="12" y1="44" x2="12" y2="50" stroke="#00A86B" stroke-width="1.5"/>
  <!-- Dotted aspiration line -->
  <path d="M14 40 L50 12" stroke="#8FA882" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
</svg>