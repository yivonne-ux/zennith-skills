  <!-- Small ring connecting bail to chain -->
  <circle cx="32" cy="6" r="2.5" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
  <!-- Jade teardrop pendant -->
  <path d="M32 14 Q22 28 22 38 Q22 52 32 56 Q42 52 42 38 Q42 28 32 14 Z" fill="#00A86B" stroke="#1A1A1A" stroke-width="2"/>
