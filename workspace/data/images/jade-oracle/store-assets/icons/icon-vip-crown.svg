<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Crown body -->
  <path d="M8 44 L14 20 L24 32 L32 14 L40 32 L50 20 L56 44 Z" stroke="#1A1A1A" stroke-width="2" fill="none"/>
  <!-- Crown base band -->
  <rect x="8" y="44" width="48" height="6" rx="1" stroke="#1A1A1A" stroke-width="2" fill="none"/>
  <!-- Gold accent on band -->
  <line x1="10" y1="47" x2="54" y2="47" stroke="#D4AF37" stroke-width="1"/>
  <!-- Center jade stone -->
  <ellipse cx="32" cy="44" rx="4" ry="3" fill="#00A86B" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Stone highlight -->
  <ellipse cx="31" cy="43" rx="1.5" ry="1" fill="rgba(255,255,255,0.25)" stroke="none"/>
  <!-- Crown point tips — gold dots -->
  <circle cx="14" cy="20" r="2" fill="#D4AF37" stroke="#1A1A1A" stroke-width="1"/>
  <circle cx="32" cy="14" r="2.5" fill="#D4AF37" stroke="#1A1A1A" stroke-width="1"/>
  <circle cx="50" cy="20" r="2" fill="#D4AF37" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Small decorative dots on crown face -->
  <circle cx="20" cy="36" r="1" fill="#D4AF37" opacity="0.6"/>
  <circle cx="44" cy="36" r="1" fill="#D4AF37" opacity="0.6"/>
  <!-- Subtle inner lines for regality -->
  <path d="M14 20 L18 36" stroke="#8FA882" stroke-width="0.75" opacity="0.4"/>
  <path d="M50 20 L46 36" stroke="#8FA882" stroke-width="0.75" opacity="0.4"/>
  <!-- Crown cushion base -->
  <path d="M10 50 Q32 54 54 50" stroke="#722F37" stroke-width="1.5" fill="none"/>
</svg>