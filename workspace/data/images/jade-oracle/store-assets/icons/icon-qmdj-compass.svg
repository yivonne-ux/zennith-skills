<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="20" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- 8 directional lines (八卦) -->
  <line x1="32" y1="4" x2="32" y2="12" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="32" y1="52" x2="32" y2="60" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="4" y1="32" x2="12" y2="32" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="52" y1="32" x2="60" y2="32" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="12.2" y1="12.2" x2="17.9" y2="17.9" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="46.1" y1="46.1" x2="51.8" y2="51.8" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="51.8" y1="12.2" x2="46.1" y2="17.9" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="17.9" y1="46.1" x2="12.2" y2="51.8" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Center jade dot -->
  <circle cx="32" cy="32" r="4" fill="#00A86B" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- South pointer (traditional Luopan) -->
  <path d="M32 28 L29 20 L32 22 L35 20 Z" fill="#722F37" stroke="#722F37" stroke-width="1"/>
  <!-- North pointer -->
  <path d="M32 36 L29 44 L32 42 L35 44 Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Tick marks on outer ring -->
  <line x1="32" y1="4" x2="32" y2="7" stroke="#D4AF37" stroke-width="1"/>
  <line x1="32" y1="57" x2="32" y2="60" stroke="#D4AF37" stroke-width="1"/>
  <line x1="4" y1="32" x2="7" y2="32" stroke="#D4AF37" stroke-width="1"/>
  <line x1="57" y1="32" x2="60" y2="32" stroke="#D4AF37" stroke-width="1"/>
</svg>