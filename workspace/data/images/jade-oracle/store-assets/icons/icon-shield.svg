  <!-- Stone highlight -->
  <ellipse cx="30" cy="29" rx="2.5" ry="3.5" fill="rgba(255,255,255,0.2)" stroke="none"/>
  <!-- Decorative lines radiating from stone -->
  <line x1="32" y1="20" x2="32" y2="23" stroke="#D4AF37" stroke-width="1"/>
  <line x1="32" y1="41" x2="32" y2="44" stroke="#D4AF37" stroke-width="1"/>
  <line x1="22" y1="32" x2="25" y2="32" stroke="#D4AF37" stroke-width="1"/>
  <line x1="39" y1="32" x2="42" y2="32" stroke="#D4AF37" stroke-width="1"/>
  <!-- Small corner accents on shield -->
  <path d="M32 8 L34 12" stroke="#8FA882" stroke-width="0.75"/>
  <path d="M32 8 L30 12" stroke="#8FA882" stroke-width="0.75"/>
</svg>