<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hourglass top triangle -->
  <path d="M16 10 L48 10 L34 30 L30 30 L16 10 Z" stroke="#1A1A1A" stroke-width="2" fill="none"/>
  <!-- Hourglass bottom triangle -->
  <path d="M16 54 L48 54 L34 34 L30 34 L16 54 Z" stroke="#1A1A1A" stroke-width="2" fill="none"/>
  <!-- Top cap -->
  <line x1="13" y1="10" x2="51" y2="10" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Bottom cap -->
  <line x1="13" y1="54" x2="51" y2="54" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Sand in top (partial) -->
  <path d="M24 16 L40 16 L34 28 L30 28 Z" fill="#D4AF37" opacity="0.3" stroke="none"/>
  <!-- Sand in bottom (accumulated) -->
  <path d="M22 48 L42 48 L34 36 L30 36 Z" fill="#D4AF37" opacity="0.5" stroke="none"/>
  <!-- Narrow waist stream -->
  <line x1="32" y1="30" x2="32" y2="34" stroke="#D4AF37" stroke-width="1"/>
  <!-- Crescent moon (top right) -->
  <path d="M48 8 Q54 14 48 20 Q50 14 48 8 Z" fill="#00A86B" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Small stars near moon -->
  <circle cx="52" cy="6" r="0.8" fill="#D4AF37"/>
  <circle cx="55" cy="12" r="0.6" fill="#D4AF37"/>
</svg>