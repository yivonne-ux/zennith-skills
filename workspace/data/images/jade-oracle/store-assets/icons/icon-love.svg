<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left circle -->
  <circle cx="24" cy="32" r="16" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Right circle -->
  <circle cx="40" cy="32" r="16" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Intersection fill (vesica piscis — yin-yang overlap) -->
  <clipPath id="left-clip">
    <circle cx="24" cy="32" r="16"/>
  </clipPath>
  <circle cx="40" cy="32" r="16" fill="#00A86B" opacity="0.2" clip-path="url(#left-clip)"/>
  <!-- Yin-yang inspired S-curve through intersection -->
  <path d="M32 16.5 Q28 24 32 32 Q36 40 32 47.5" stroke="#00A86B" stroke-width="1.5" fill="none"/>
  <!-- Small jade dot top of S -->
  <circle cx="32" cy="24" r="2" fill="#00A86B"/>
  <!-- Small warm-black dot bottom of S -->
  <circle cx="32" cy="40" r="2" fill="#1A1A1A"/>
  <!-- Gold accent arcs at top and bottom of intersection -->
  <path d="M29 17 Q32 15 35 17" stroke="#D4AF37" stroke-width="1" fill="none"/>
  <path d="M29 47 Q32 49 35 47" stroke="#D4AF37" stroke-width="1" fill="none"/>
</svg>