<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- 3x3 grid (九宫 / 9 palaces) -->
  <!-- Outer border -->
  <rect x="8" y="8" width="48" height="48" rx="2" ry="2" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Vertical grid lines -->
  <line x1="24" y1="8" x2="24" y2="56" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="40" y1="8" x2="40" y2="56" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Horizontal grid lines -->
  <line x1="8" y1="24" x2="56" y2="24" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="8" y1="40" x2="56" y2="40" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Star in center palace -->
  <polygon points="32,26 33.8,30.5 38.5,31 35,34 36,38.7 32,36.2 28,38.7 29,34 25.5,31 30.2,30.5" fill="#D4AF37" stroke="#D4AF37" stroke-width="1"/>
  <!-- Subtle dots in other palaces -->
  <circle cx="16" cy="16" r="1.5" fill="#8FA882"/>
  <circle cx="48" cy="16" r="1.5" fill="#8FA882"/>
  <circle cx="16" cy="48" r="1.5" fill="#8FA882"/>
  <circle cx="48" cy="48" r="1.5" fill="#8FA882"/>
  <!-- Corner accents (Asian-inspired) -->
  <path d="M8 13 L8 8 L13 8" stroke="#00A86B" stroke-width="2" fill="none"/>
  <path d="M51 8 L56 8 L56 13" stroke="#00A86B" stroke-width="2" fill="none"/>
  <path d="M8 51 L8 56 L13 56" stroke="#00A86B" stroke-width="2" fill="none"/>
  <path d="M51 56 L56 56 L56 51" stroke="#00A86B" stroke-width="2" fill="none"/>
</svg>