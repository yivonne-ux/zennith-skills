<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Back card (slightly rotated left) -->
  <rect x="10" y="10" width="30" height="44" rx="3" ry="3" stroke="#1A1A1A" stroke-width="2" fill="none" transform="rotate(-8 25 32)"/>
  <!-- Back card inner border -->
  <rect x="13" y="13" width="24" height="38" rx="2" ry="2" stroke="#D4AF37" stroke-width="0.75" fill="none" transform="rotate(-8 25 32)"/>
  <!-- Front card (slightly rotated right) -->
  <rect x="24" y="8" width="30" height="44" rx="3" ry="3" stroke="#1A1A1A" stroke-width="2" fill="#F5F0E8" transform="rotate(5 39 30)"/>
  <!-- Front card inner border -->
  <rect x="27" y="11" width="24" height="38" rx="2" ry="2" stroke="#D4AF37" stroke-width="0.75" fill="none" transform="rotate(5 39 30)"/>
  <!-- Jade circle on front card -->
  <circle cx="39" cy="26" r="5" fill="#00A86B" stroke="#1A1A1A" stroke-width="1.5" transform="rotate(5 39 30)"/>
  <!-- Small decorative lines on front card -->
  <line x1="33" y1="36" x2="45" y2="36" stroke="#8FA882" stroke-width="1" transform="rotate(5 39 30)"/>
  <line x1="35" y1="39" x2="43" y2="39" stroke="#8FA882" stroke-width="1" transform="rotate(5 39 30)"/>
  <line x1="36" y1="42" x2="42" y2="42" stroke="#8FA882" stroke-width="0.75" transform="rotate(5 39 30)"/>
</svg>