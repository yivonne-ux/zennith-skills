  <path d="M42 6 L42 16 L52 16" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
  <!-- Corner fold fill -->
  <path d="M42 6 L42 16 L52 16 Z" fill="#F5F0E8" stroke="none"/>
  <!-- Text lines -->
  <line x1="18" y1="24" x2="40" y2="24" stroke="#1A1A1A" stroke-width="1" opacity="0.4"/>
  <line x1="18" y1="29" x2="44" y2="29" stroke="#1A1A1A" stroke-width="1" opacity="0.4"/>
  <line x1="18" y1="34" x2="38" y2="34" stroke="#1A1A1A" stroke-width="1" opacity="0.4"/>
  <line x1="18" y1="39" x2="42" y2="39" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <!-- Jade seal / stamp (circular chop mark) -->
  <circle cx="40" cy="48" r="7" stroke="#722F37" stroke-width="1.5" fill="none" opacity="0.8"/>
  <circle cx="40" cy="48" r="5" stroke="#722F37" stroke-width="0.75" fill="none" opacity="0.6"/>
  <!-- Seal character (stylized 玉 jade) -->
  <line x1="37" y1="46" x2="43" y2="46" stroke="#722F37" stroke-width="1.2"/>
  <line x1="40" y1="44" x2="40" y2="52" stroke="#722F37" stroke-width="1.2"/>
  <line x1="37" y1="49" x2="43" y2="49" stroke="#722F37" stroke-width="1"/>
  <!-- Small jade dot accent -->
  <circle cx="40" cy="52" r="0.8" fill="#00A86B"/>
</svg>