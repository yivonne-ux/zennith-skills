version: "3.9"

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex_secret
      POSTGRES_DB: apex_meta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex_meta"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Backend API ---
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # --- Celery Worker ---
  celery-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/celery.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.core.celery_app worker -l info -Q default,research,audit,deployment -c 4

  # --- Celery Beat (Scheduler) ---
  celery-beat:
    build:
      context: .
      dockerfile: infrastructure/docker/celery.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.core.celery_app beat -l info

  # --- Frontend ---
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
