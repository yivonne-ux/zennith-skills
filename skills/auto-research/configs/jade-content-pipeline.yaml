# Auto-Research Config: Jade Oracle Content Production Pipeline
# Full content piece generator: hook + visual prompt + caption + hashtags
# Evaluates against 10 quality criteria for engagement optimization
#
# Usage: bash auto-loop.sh configs/jade-content-pipeline.yaml
#
# This config generates complete Instagram content pieces for Jade Oracle.
# Each variant is a full content brief: scroll-stopping hook, image/video
# direction, caption copy, hashtags, and CTA — scored as a unified piece.

objective: "engagement_rate"
task: "Generate a complete Instagram content piece for Jade Oracle (@the_jade_oracle). CRITICAL RULES: DO NOT mention oracle, 奇门遁甲, BaZi, 八字, or Chinese metaphysics terms. Jade is an oracle reader focused on self-love, kindness, life transitions, trusting intuition, and spiritual guidance. Use max 5-7 hashtags (not 15-20). The piece must include: (1) a scroll-stopping hook about self-love/growth/kindness (first line), (2) a visual direction prompt for Jade character, (3) a full personal caption (journal-style, warm, vulnerable), (4) 5-7 relevant hashtags, and (5) a soft CTA. Target audience: spiritual women 25-45 navigating life transitions. Jade is a Korean woman, 31, warm brown eyes, long dark hair with curtain bangs, jade pendant necklace (always). Palette: jade green (#00A86B), gold (#D4AF37), cream (#F5F0E8). Tone: warm best friend over tea — NOT corporate, NOT witchy, NOT educational, NOT preachy. Topics: self-love, kindness, vulnerability, morning rituals, oracle readings, trusting yourself, being in between chapters."
brand: "jade-oracle"
model: "claude-sonnet-4-6"
max_iterations: 15
keep_threshold: null

template: |
  HOOK: "What does your birth chart say about this week?"

  VISUAL DIRECTION:
  Jade sitting at her reading table, warm window light, jade pendant visible.
  She holds a ceramic tea mug, tarot cards spread on a sage green linen cloth.
  Shot: medium close-up, shallow depth of field. Mood: warm, intimate, inviting.
  Lighting: natural side window light with warm candle fill. Style: editorial lifestyle.
  Ref: face-lock v22. Palette: cream background, jade green accents, gold candle holders.

  CAPTION:
  Every week, the energy shifts.
  And most people just... feel it. The unexplained heaviness. The sudden clarity.
  But they don't know WHY.

  That's where ancient oracle wisdom comes in — an ancient Chinese
  metaphysical system that maps the exact energetic landscape of any moment.

  This week's chart reveals a powerful window for career decisions.
  If you've been sitting on something — this is your sign.

  Your personal reading is waiting. Link in bio.

  HASHTAGS:
  #JadeOracle #OracleReading #SpiritualGuidance #SelfLove #HealingJourney
  #OracleReading #WeeklyReading #EnergyForecast #AncientWisdom #ModernSpirituality
  #SpiritualAwakening #Divination #LifeGuidance #CosmicTiming

  CTA: "Book your $1 intro reading — link in bio"

criteria:
  - id: face_consistency
    description: "Visual direction explicitly references the v22 face-lock, describes Jade's signature features (Korean woman, curtain bangs, jade pendant, warm brown eyes), and would produce an image recognizably consistent with the locked reference"
  - id: tone_consistency
    description: "Caption reads like a warm, wise friend sharing insight over tea — not corporate (no jargon, no bullet points), not witchy (no 'spells', 'hexes', 'dark moon'), not salesy (no ALL CAPS urgency, no 'LAST CHANCE'). Natural, conversational depth."
  - id: logic_realism
    description: "Visual direction describes a physically plausible scene — correct hand count, believable object placement, consistent lighting direction, no floating objects, no impossible reflections. Scene could exist in real life."
  - id: brand_alignment
    description: "Uses jade green + gold + cream palette. Typography direction specifies Cormorant Garamond for headings and Jost for body text. Overall aesthetic matches Korean beauty editorial, not generic mystical or cosmic."
  - id: hook_power
    description: "First line (hook / text overlay) would stop a scroll in 0.5 seconds — uses pattern interrupt, curiosity gap, bold claim, or emotional trigger. Not generic ('Welcome to my page'), not clickbait ('You won't believe')."
  - id: platform_native
    description: "Feels like organic Instagram content, not an ad. Right caption length (150-300 words), natural paragraph breaks, emoji use is tasteful (0-3 max), hashtags grouped at end, story arc in caption (hook → tension → insight → CTA)."
  - id: cultural_sensitivity
    description: "Oracle terminology is accessible and warm. No heavy Chinese metaphysics jargon. Max 5% of posts can reference Eastern philosophy lightly. Language should feel like a spiritual friend, not a professor."
  - id: cta_clarity
    description: "Clear single next step — book a reading, join Telegram, visit Shopify store. CTA is specific (not 'check it out'), naturally woven into the caption (not bolted on), and low-friction ($1 intro or free resource)."
  - id: social_proof
    description: "Includes or implies credibility — number of readings done, testimonial snippet, mention of ancient tradition's 4000-year history, 'thousands of women have discovered', or similar trust signal. Not fabricated statistics."
  - id: emotional_resonance
    description: "The full content piece (hook + visual + caption) makes the viewer FEEL something specific — wonder, recognition ('that's me'), comfort, curiosity, hope. Not neutral informational. Hits an emotional truth about seeking guidance in uncertain times."

output_dir: "~/.openclaw/workspace/data/auto-research/jade-content-pipeline"

