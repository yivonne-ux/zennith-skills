# Content type rotation (used by calendar integration)
# The auto-loop generates for whichever content_type is specified at runtime.
# Override with: CONTENT_TYPE=educational bash auto-loop.sh jade-content-pipeline.yaml
content_types:
  - id: educational
    description: "Self-love rituals, oracle card meanings, trusting intuition, life transitions"
    day: "Monday"
  - id: social_proof
    description: "Testimonial screenshot, review highlight, transformation story"
    day: "Tuesday"
  - id: lifestyle
    description: "Jade's day, behind the scenes, reading setup, tea moment"
    day: "Wednesday"
  - id: reading_demo
    description: "Mini reading, oracle card pull, weekly energy snapshot"
    day: "Thursday"
  - id: emotional
    description: "Pain point → solution arc, relatable spiritual struggle, 'you're not alone'"
    day: "Friday"
  - id: community
    description: "Q&A, poll, 'which element are you?', engagement prompt"
    day: "Saturday"
  - id: spiritual
    description: "Weekly oracle message, meditation prompt, gratitude, affirmation"
    day: "Sunday"

# Cross-references
related_configs:
  - "configs/email-subject.yaml"
  - "configs/jade-instagram-loop.yaml"
related_skills:
  - "art-director"
  - "fast-iterate"
dependencies:
  face_lock_ref: "~/Desktop/gaia-projects/jade-oracle-site/images/jade/v15-v22/"
  video_compiler: "/tmp/video-compiler/"
  brand_dna: "~/.openclaw/brands/jade-oracle/DNA.json"
