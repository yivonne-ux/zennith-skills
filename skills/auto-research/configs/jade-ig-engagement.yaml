# ═══════════════════════════════════════════════════════════════════════════════
# ANTI-SPAM GUARDRAILS
# ═══════════════════════════════════════════════════════════════════════════════

guardrails:
  - "NEVER follow/unfollow in bulk — Instagram flags this instantly"
  - "NEVER use the same comment twice in 24 hours"
  - "NEVER comment on posts from the same account more than twice per day"
  - "NEVER include links in comments"
  - "NEVER use automated engagement tools (Instagram bans accounts)"
  - "Space engagement actions 30-60 seconds apart minimum"
  - "If Instagram shows a 'try again later' warning, STOP all engagement for 24 hours"
  - "Keep follow ratio healthy: never follow more than 1.5x your follower count"
  - "Unfollow non-followers after 7 days (max 20 unfollows per day)"
  - "ALL engagement must feel genuinely human — if it feels robotic, rewrite it"

