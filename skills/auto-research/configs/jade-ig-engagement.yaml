# DAILY ENGAGEMENT ROUTINE — Step by step
# ═══════════════════════════════════════════════════════════════════════════════

daily_routine:
  morning_block:
    time: "6:30 - 7:30 AM MYT"
    duration: "60 minutes"
    tasks:
      - "Post teaser Story for today's feed post"
      - "Engage with 10 target Tier 1 accounts (like + comment)"
      - "Reply to ALL comments on Jade's last post"
      - "Reply to ALL DMs from overnight"
      - "Check competitor posts for inspiration"

  post_publish:
    time: "7:30 - 8:30 AM MYT"
    duration: "60 minutes"
    tasks:
      - "Publish feed post"
      - "Add hashtags in first comment"
      - "Share to Stories with context"
      - "Engage with 10 more target accounts"
      - "Like 20 posts in Explore feed (niche hashtags)"

  afternoon_block:
    time: "2:00 - 2:30 PM MYT"
    duration: "30 minutes"
    tasks:
      - "Post engagement Story (poll/quiz/question)"
      - "Reply to any new comments on feed post"
      - "Engage with 5 Tier 2 accounts"
      - "Check if any DMs need response"

  evening_block:
    time: "9:00 - 9:30 PM MYT"
    duration: "30 minutes"
    tasks:
      - "Reshare feed post to Stories"
      - "Post night thought Story"
      - "Engage with 5 more accounts"
      - "DM welcome to any new followers"
      - "Log day's engagement stats"

  total_daily_time: "2.5 hours"

