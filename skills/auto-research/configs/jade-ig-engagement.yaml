# ═══════════════════════════════════════════════════════════════════════════════
# POSTING TIMES — Dual timezone optimization (MYT + US)
# ═══════════════════════════════════════════════════════════════════════════════

posting_times:
  primary_window:
    myt: "7:00 AM - 9:00 AM"
    est: "7:00 PM - 9:00 PM (previous day)"
    pst: "4:00 PM - 6:00 PM (previous day)"
    rationale: "Morning in Malaysia catches evening scroll in US/EU. Double timezone hit."

  secondary_window:
    myt: "9:00 PM - 10:00 PM"
    est: "9:00 AM - 10:00 AM"
    pst: "6:00 AM - 7:00 AM"
    rationale: "Night in Malaysia catches morning scroll in US. Good for Stories and casual posts."

  weekend_adjustment:
    myt: "9:00 AM - 11:00 AM"
    rationale: "Audiences scroll later on weekends. Push posting time 1-2 hours later."

  stories_schedule:
    - time: "6:30 AM MYT"
      type: "Teaser for feed post"
    - time: "8:30 AM MYT"
      type: "Behind-scenes or spontaneous moment"
    - time: "2:00 PM MYT"
      type: "Engagement — poll, quiz, question"
    - time: "7:00 PM MYT"
      type: "Reshare feed post with context"
    - time: "10:00 PM MYT"
      type: "Night thought — reflective, intimate"

# ═══════════════════════════════════════════════════════════════════════════════
# DM STRATEGY — Warm outreach templates
# ═══════════════════════════════════════════════════════════════════════════════

dm_strategy:
  new_follower_welcome:
    timing: "Within 24 hours of follow"
    template: |
      hey! thank you for following — I noticed you're into [their niche/interest].
      I share weekly readings and ancient wisdom from QMDJ (Chinese metaphysics).
      if you ever want a personal reading, I'd love to do one for you.
      welcome to this space. it means a lot that you're here.

  engaged_follower:
    timing: "After someone comments 3+ times"
    template: |
      I keep seeing your name in my comments and it makes me smile.
      thank you for being part of this community — your energy is felt.
      I'd love to know — what drew you to this space?

  collab_outreach:
    timing: "After engaging with their content for 2+ weeks"
    template: |
      hi [name]! I've been following your content and I'm genuinely inspired
      by what you create in [their niche]. your take on [specific post] really stuck with me.
      I practice QMDJ — a 4,000-year-old Chinese metaphysical system — and I think
      our audiences would love a collab. would you be open to a joint IG live
      or a reading exchange? no pressure at all — just thought it could be beautiful.

