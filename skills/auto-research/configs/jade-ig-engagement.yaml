# Jade Oracle — Instagram Engagement Bot Strategy
# Organic growth engine for @jade141319 targeting 10K followers
#
# This is NOT an automated bot — it's a strategy playbook + comment templates
# for systematic daily engagement. Jade (or her team) executes manually
# with strategic precision guided by this config.
#
# Usage: Reference this file during daily engagement sessions.
# Pairs with: jade-ig-daily.sh (research), GROWTH-TRACKER.md (metrics)

brand: "jade-oracle"
account: "@jade141319"
target: 10000  # followers
current_phase: "0_to_500"  # Update as milestones hit

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE STRATEGY — Engagement intensity scales with follower count
# ═══════════════════════════════════════════════════════════════════════════════

phases:
  - id: "0_to_500"
    label: "Foundation Phase"
    daily_engagement:
      follows: 20       # Follow target accounts
      likes: 50         # Like posts in target niches
      comments: 30      # Genuine comments (use templates below)
      story_reactions: 15
      dms: 5            # Warm DMs to new followers or engaged accounts
    focus: "Build initial tribe. Comment on EVERY post from target accounts. Be the most engaged person in their comments."
    duration_weeks: 6

  - id: "500_to_1000"
    label: "Momentum Phase"
    daily_engagement:
      follows: 15
      likes: 40
      comments: 40      # Increase comment volume
      story_reactions: 20
      dms: 10
      collab_outreach: 3 # DM micro-influencers for collabs
    focus: "Start getting recognized by accounts. Push for collab shoutouts. DM new followers within 24 hours."
    duration_weeks: 8

  - id: "1000_to_5000"
    label: "Authority Phase"
    daily_engagement:
      follows: 10
      likes: 30
      comments: 50      # Quality over quantity
      story_reactions: 25
      dms: 15
      collab_outreach: 5
    focus: "Selective engagement. Focus on accounts with 5K-50K followers. Position as a peer, not a fan."
    duration_weeks: 16

  - id: "5000_to_10000"
    label: "Scale Phase"
    daily_engagement:
      follows: 5
      likes: 20
      comments: 30
      story_reactions: 30
      dms: 20
      collab_outreach: 7
      lives: 2          # Go live per week
    focus: "Let content do the heavy lifting. Engage strategically with larger accounts. Host lives and collabs."
    duration_weeks: 12

# ═══════════════════════════════════════════════════════════════════════════════
# TARGET ACCOUNTS — Who to engage with daily
# ═══════════════════════════════════════════════════════════════════════════════

target_accounts:
  tier_1_engage_daily:
    description: "Micro-influencers (1K-10K) in spiritual niche — engage every post"
    criteria:
      - "Follower count: 1,000 - 10,000"
      - "Niche: astrology, tarot, oracle readings, spiritual guidance"
      - "Engagement rate: > 3%"
      - "Posts in English"
      - "Aesthetic: warm, editorial, not generic"
    example_account_types:
      - "Tarot readers with personal brands"
      - "Astrology educators"
      - "Spiritual coaches with small but engaged audiences"
      - "Crystal/energy healers with lifestyle content"
      - "Meditation teachers with Korean/East Asian aesthetic"

  tier_2_engage_3x_week:
    description: "Mid-influencers (10K-50K) — comment on best posts only"
    criteria:
      - "Follower count: 10,000 - 50,000"
      - "Niche overlap with Jade's pillars"
      - "Active, responsive to comments"
    example_account_types:
      - "Popular astrology accounts"
      - "Wellness lifestyle influencers"
      - "Self-help / personal growth creators"
      - "Spiritual podcast hosts"
      - "Korean beauty/wellness crossover accounts"

  tier_3_aspirational:
    description: "Large accounts (50K+) — engage selectively for visibility"
    criteria:
      - "Follower count: 50,000+"
      - "High comment visibility (early commenting strategy)"
      - "Niche alignment"
    strategy: "Be among the first 10 comments. Say something insightful, not generic. Goal: their followers see Jade's comment and click through."

# ═══════════════════════════════════════════════════════════════════════════════
# COMMENT TEMPLATES — 50 templates in Jade's authentic voice
# ═══════════════════════════════════════════════════════════════════════════════
#
# Rules for commenting:
# 1. NEVER copy-paste verbatim — adapt each template to the specific post
# 2. Reference something specific from THEIR content
# 3. No emojis beyond 1-2 per comment (tasteful, not spam)
# 4. Sound like a real spiritual practitioner, not a brand
# 5. NEVER include a CTA or link in comments
# 6. Keep under 150 characters for casual comments, up to 300 for deep ones

comment_templates:

  # --- Category 1: Resonance & Recognition (for emotional/relatable posts) ---
  resonance:
    - "this resonated so deeply. needed this today."
    - "the way you put this into words... I felt that in my chest."
    - "I've been sitting with this exact feeling all week. thank you for naming it."
    - "saving this. some posts are just medicine."
    - "this is the kind of truth that makes you put your phone down and just breathe."
    - "I read this three times. each time it hit differently."
    - "your words carry something real. I can feel it through the screen."
    - "there's a reason this showed up on my feed today. the timing is everything."
    - "the universe really does put the right messages in front of us. this is proof."
    - "I needed to hear this more than you know."

  # --- Category 2: Admiration & Encouragement (for beautiful content) ---
  admiration:
    - "your energy in this is everything."
    - "the warmth in this photo stopped my scroll. genuinely."
    - "there's something about your feed that just feels like a deep exhale."
    - "everything about this — the words, the visual, the energy. perfect."
    - "you have a gift for making the complex feel simple and warm."
    - "this is the content the spiritual community actually needs."
    - "your consistency inspires me. every post teaches me something."
    - "I always learn something when I visit your page. keep shining."
    - "the aesthetic of your feed is healing in itself."
    - "you make this space feel safe and real. that matters more than you think."

  # --- Category 3: Curiosity & Questions (for educational posts) ---
  curiosity:
    - "I never thought about it this way before. how long have you been studying this?"
    - "this is fascinating. do you have a post that goes deeper on this topic?"
    - "I've been curious about this for a while — your explanation finally clicked."
    - "the way you broke this down... more of this please."
    - "this is the kind of education that changes how people see themselves."
    - "I've studied this for years and you still taught me something new."
    - "question — how does this connect to elemental energy? I see parallels."
    - "thank you for making this accessible. so many gatekeep this knowledge."
    - "the simplicity of your teaching is what makes it powerful."
    - "I love how you bridge ancient wisdom with modern life. it's rare."

  # --- Category 4: Community Building (for engagement/quiz posts) ---
  community:
    - "fire element and it explains SO much about my week."
    - "I'm a wood element and this is painfully accurate."
    - "tagged my best friend — she needs to see this immediately."
    - "screenshotted this for my journal. this is reference material."
    - "okay I need to know more about palace #4 now."
    - "this quiz just called me out in the best way possible."
    - "sharing this in my circle — everyone needs to find their element."
    - "the accuracy of this is actually unreal."
    - "I love that you create content that makes us reflect, not just scroll."
    - "these kinds of posts are why I followed you."

  # --- Category 5: Spiritual Connection (for readings/oracle posts) ---
  spiritual:
    - "your readings always carry something real. this one gave me chills."
    - "the middle card... that's exactly what I needed to hear."
    - "I felt the energy shift just reading your interpretation."
    - "this weekly reading feels like it was written specifically for me."
    - "there's a depth to your readings that I rarely see. you feel the cards."
    - "the way you interpret energy is a genuine gift."
    - "I always save your weekly readings. they guide my whole week."
    - "you don't just read cards — you read the space between them."
    - "every time I doubt my path, one of your readings appears. thank you."
    - "the reverence you bring to this practice is beautiful. it shows."

